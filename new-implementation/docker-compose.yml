# ── Para desarrollo local ──────────────────────────────────────────────────────
# Setup (una vez, antes de `docker compose up -d`):
#   1. cp .env.example .env   → credenciales MYSQL_* del contenedor MySQL
#      (.env está gitignored; nunca subas secretos reales).
#   2. cp backend/.env.example backend/.env
#      → rellena DB_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET, CORS_ORIGINS
#        (el backend corre en NODE_ENV=production y FALLA si quedan en CHANGE_ME).
#        Genera secretos: openssl rand -base64 48
#      → rellena BOOTSTRAP_ADMIN_EMAIL/PASSWORD (min 12) para crear el primer
#        admin en la base vacía — si no, nadie puede iniciar sesión.
#   3. cp frontend/.env.local.example frontend/.env.local   (opcional)
#   4. docker compose up -d
# En Coolify se despliega cada servicio por separado (ver DEPLOYMENT-COOLIFY.md).

services:
  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pos_mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Schema is owned by TypeORM migrations (the backend runs them on boot via
      # DB_RUN_MIGRATIONS=true below), NOT a preloaded SQL dump. database/schema.sql
      # is historical/divergent — see SPEC-CUT-001 B-05.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (NestJS) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: pos_backend
    restart: unless-stopped
    env_file:
      # Create from backend/.env.example (see header). Non-fatal if absent so
      # `docker compose up` doesn't hard-error — the backend then fails fast with
      # a clear "missing production env vars" message instead.
      - path: ./backend/.env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_RUN_MIGRATIONS: "true"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
    container_name: pos_frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      # Optional — NEXT_PUBLIC_API_URL is baked at build time via the build arg
      # above, so the frontend runs without this file.
      - path: ./frontend/.env.local
        required: false
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Legacy source DB (M4 migration only) ───────────────────────────────────
  # Holds the frozen legacy .NET dump for parity validation. NOT part of the
  # normal stack — gated behind the `migration` profile so `docker compose up`
  # never starts it. Drop the dump at migration/dumps/legacy.sql first, then:
  #   docker compose --profile migration up -d mysql_legacy
  # The migration CLI (new-implementation/migration) reads it on :3309.
  mysql_legacy:
    image: mysql:8.0
    container_name: pos_mysql_legacy
    profiles: ["migration"]
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: ${LEGACY_ROOT_PASSWORD:-legacy_root}
      MYSQL_DATABASE: pos_legacy
    ports:
      - "3309:3306"
    volumes:
      - mysql_legacy_data:/var/lib/mysql
      # Any *.sql here is loaded on first boot (alphabetical). legacy.sql is
      # gitignored; .gitkeep keeps the dir present.
      - ./migration/dumps:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
  mysql_legacy_data:
    driver: local
