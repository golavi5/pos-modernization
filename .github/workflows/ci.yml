name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Gates PRs on backend unit tests + build and frontend build (Next build runs the
# TS typecheck). Node 20 matches the Dockerfiles. Lint is not gated yet — neither
# app ships an ESLint config (`next lint`/`eslint` have nothing to run); adding
# configs is tracked separately (SPEC-CUT-001 S-01).
#
# NOTE: this file must live at the REPO ROOT (.github/workflows/). The previous
# workflow sat under new-implementation/.github/ and therefore never ran.
jobs:
  backend:
    name: Backend — test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./new-implementation/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: new-implementation/backend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./new-implementation/frontend
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: new-implementation/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  migration:
    name: Migration — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./new-implementation/migration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: new-implementation/migration/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      # Unit + e2e. The e2e boots real MySQL via Testcontainers — Docker is
      # available natively on ubuntu-latest, so no socket-mount setup is needed.
      # provision.spec reads ../backend migrations (present via full checkout).
      - run: npx vitest run

  e2e:
    name: E2E — Playwright (non-blocking)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    # Non-blocking: the full-stack orchestration below is not yet validated on a
    # runner (sale flows need seeded catalog data). The backend/frontend jobs are
    # the gates; this runs for signal until E2E is hardened (S-01 follow-up).
    continue-on-error: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pos_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: ./new-implementation/backend
        run: npm ci

      - name: Install frontend deps
        working-directory: ./new-implementation/frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./new-implementation/frontend
        run: npx playwright install --with-deps chromium

      # Backend on :3001 (migrations + admin bootstrap on boot); the frontend
      # (started by Playwright's webServer) keeps the default :3000 the config expects.
      - name: Build + start backend (:3001)
        working-directory: ./new-implementation/backend
        env:
          NODE_ENV: production
          PORT: '3001'
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: pos_test
          DB_RUN_MIGRATIONS: 'true'
          JWT_SECRET: ci-test-jwt-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: ci-test-refresh-secret-bbbbbbbbbbbbbbbbbbbb
          CORS_ORIGINS: http://localhost:3000
          BOOTSTRAP_ADMIN_EMAIL: admin@ci.local
          BOOTSTRAP_ADMIN_PASSWORD: ci-admin-password-123
        run: |
          npm run build
          node dist/main.js &
          npx wait-on http://localhost:3001/health -t 60000

      - name: Run E2E (frontend :3000 → API :3001)
        working-directory: ./new-implementation/frontend
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: new-implementation/frontend/playwright-report/
          retention-days: 30
